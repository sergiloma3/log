<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHaril</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="logo">SHaril</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Service</a>
        <a href="#">Design</a>
        <a href="#">Contact</a>
      </nav>

      <!-- BARRE DE RECHERCHE -->
      <div class="search-box">
        <input type="text" placeholder="Type to search" />
        <button>Search</button>
      </div>
    </header>

    <!-- SECTION PRINCIPALE -->
    <section class="main">
      <div class="content">
        <h1>Web Design &<br /><span>Development</span><br />Service</h1>
        <p>
          Je crée des sites web modernes et rapides pour tous types de
          projets...
        </p>
        <button class="btn">Voir plus</button>
      </div>

      <!-- FORMULAIRE LOGIN -->
      <div class="login-box">
        <h2>Connexion</h2>

        <input type="email" placeholder="Enter Email Here" />
        <input type="password" placeholder="Enter Password Here" />

        <button class="login-btn">Login</button>

        <div class="link">
          <p>Don't have an account?</p>
          <br />
          <a href="#">Sign up here</a>
        </div>
      </div>
    </section>
  </body>
</html>
